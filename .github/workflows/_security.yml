name: Security

on:
  workflow_call:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for known vulnerabilities
        run: pnpm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_SARIF_REPORT_ARTIFACT_NAME: gitleaks-results-${{ github.job }}

  lockfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify no non-HTTPS registry URLs
        run: |
          if grep -qE '^\s+resolution:.*http:' pnpm-lock.yaml; then
            echo "::error::Found insecure (non-HTTPS) registry URLs in lockfile"
            grep -nE '^\s+resolution:.*http:' pnpm-lock.yaml
            exit 1
          fi
          echo "All registry URLs use HTTPS"